<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#facc15" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- SEO Optimization -->
    <title>Lenden - Your Smart Digital Ledger | লেনদেন</title>
    <meta name="description" content="Lenden is an offline-first digital ledger (halkhata) for local businesses in Bangladesh. Manage customers, track dues, grow your business locally.">
    <meta name="keywords" content="halkhata, ledger, hisab khata, micro business app, offline ledger, lending tracker">
    
    <!-- Open Graph / AEO / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Lenden - Your Smart Digital Ledger">
    <meta property="og:description" content="Manage your shop's daily transactions securely and offline. Made for Bangladesh.">
    <meta property="og:url" content="https://lenden.app/">
    <meta property="og:site_name" content="Lenden App">
    
    <!-- GEO & AI Optimization (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Lenden - Digital Ledger",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Android, iOS, Web",
      "description": "Lenden is an offline-first mobile web application that helps micro-merchants and shopkeepers manage their daily customers, credit (baki), and transactions efficiently.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "audience": {
        "@type": "Audience",
        "audienceType": "Shopkeepers, Micro-merchants, Small business owners in Bangladesh and surrounding regions."
      }
    }
    </script>
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
